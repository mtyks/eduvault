<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduVault - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen px-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-blue-600 mb-2">สมัครสมาชิก</h1>
            <p class="text-slate-500 text-sm">เริ่มต้นใช้งาน EduVault สำหรับการเรียนการสอน</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">อีเมล</label>
                <input type="email" id="email" placeholder="example@university.ac.th" class="w-full p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">รหัสผ่าน</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">ประเภทผู้ใช้งาน</label>
                <select id="role" class="w-full p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-white cursor-pointer transition">
                    <option value="student">นักศึกษา (Student)</option>
                    <option value="teacher">อาจารย์ (Teacher)</option>
                </select>
            </div>

            <button onclick="handleRegister()" id="regBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 active:scale-95 transition-all">
                สร้างบัญชีใหม่
            </button>
        </div>

        <div class="mt-6 text-center">
            <p class="text-sm text-slate-500">มีบัญชีอยู่แล้ว? <a href="auth.html" class="text-blue-600 font-semibold hover:underline">เข้าสู่ระบบที่นี่</a></p>
        </div>
        <p id="message" class="mt-6 text-center text-sm font-medium min-h-[20px]"></p>
    </div>

    <script>
        const API_URL = 'http://54.179.11.105:3000'; // หรือ const API = ...

        async function handleRegister() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const msg = document.getElementById('message');
            const btn = document.getElementById('regBtn');

            if (!email || !password) return alert('กรุณากรอกข้อมูลให้ครบ');

            btn.innerText = 'กำลังประมวลผล...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('userEmail', email); // เก็บไว้ส่งต่อให้หน้า confirm
                    msg.className = "mt-6 text-center text-blue-500";
                    msg.innerText = "สมัครสำเร็จ! กำลังไปหน้ายืนยันอีเมล...";
                    setTimeout(() => window.location.href = 'confirm.html', 2000);
                } else {
                    msg.className = "mt-6 text-center text-red-500";
                    msg.innerText = data.error || "สมัครสมาชิกไม่สำเร็จ";
                    btn.innerText = 'สร้างบัญชีใหม่';
                    btn.disabled = false;
                }
            } catch (err) {
                msg.innerText = "เชื่อมต่อ Server ไม่ได้";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

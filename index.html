<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduVault - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b border-slate-200 px-8 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" />
                </svg>
            </div>
            <h1 class="text-xl font-bold text-slate-800">EduVault <span class="text-blue-600">Cloud</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right hidden sm:block">
                <p id="userEmailDisplay" class="text-sm font-medium text-slate-700"></p>
                <p id="userRoleBadge" class="text-[10px] uppercase tracking-wider font-bold px-2 py-0.5 rounded-full inline-block"></p>
            </div>
            <button onclick="logout()" class="bg-slate-100 hover:bg-red-50 hover:text-red-600 text-slate-600 px-4 py-2 rounded-lg text-sm font-medium transition-all">
                ออกจากระบบ
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 sm:p-8">
        
        <div id="uploadSection" class="hidden mb-8">
            <h2 class="text-lg font-semibold text-slate-800 mb-4">อัปโหลดสื่อการสอน</h2>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-dashed hover:border-blue-400 transition-all text-center">
                <input type="file" id="fileInput" class="hidden">
                <label for="fileInput" class="cursor-pointer group">
                    <div class="bg-blue-50 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3 group-hover:bg-blue-100 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                    </div>
                    <p class="text-slate-600 font-medium">คลิกเพื่อเลือกไฟล์ หรือลากไฟล์มาวางที่นี่</p>
                    <p id="fileNamePreview" class="text-blue-500 text-sm mt-2"></p>
                </label>
                <button onclick="uploadFile()" id="upBtn" class="mt-4 bg-blue-600 text-white px-8 py-2.5 rounded-xl font-semibold hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all active:scale-95">
                    อัปโหลดไฟล์
                </button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                <h3 id="tableTitle" class="font-bold text-slate-800">รายการไฟล์ของคุณ</h3>
                <span id="fileCount" class="text-xs font-medium bg-slate-100 text-slate-500 px-2.5 py-1 rounded-full">0 ไฟล์</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 text-[11px] uppercase tracking-widest font-bold">
                            <th class="px-6 py-4">ชื่อไฟล์</th>
                            <th class="px-6 py-4">วันที่อัปโหลด</th>
                            <th class="px-6 py-4 text-right">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="list" class="divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>

            <div id="emptyState" class="hidden py-20 text-center">
                <p class="text-slate-400">ยังไม่มีไฟล์ในระบบ</p>
            </div>
        </div>
    </main>

    <script>
        const API = 'http://54.179.11.105:3000';
        const token = localStorage.getItem('accessToken');
        const role = localStorage.getItem('userRole');
        const email = localStorage.getItem('userEmail');

        if (!token) window.location.href = 'auth.html';

        // ตั้งค่า UI ตาม Role
        document.getElementById('userEmailDisplay').innerText = email;
        const badge = document.getElementById('userRoleBadge');
        
        if (role === 'teacher') {
            badge.innerText = 'อาจารย์';
            badge.className += ' bg-orange-100 text-orange-600';
            document.getElementById('uploadSection').classList.remove('hidden');
            document.getElementById('tableTitle').innerText = 'คลังสื่อการสอนของฉัน';
        } else {
            badge.innerText = 'นักศึกษา';
            badge.className += ' bg-blue-100 text-blue-600';
            document.getElementById('tableTitle').innerText = 'เอกสารประกอบการเรียน';
        }

        // แสดงชื่อไฟล์เมื่อเลือก
        document.getElementById('fileInput').onchange = e => {
            document.getElementById('fileNamePreview').innerText = e.target.files[0]?.name || '';
        };

        async function loadFiles() {
            const endpoint = (role === 'teacher') ? `${API}/files` : `${API}/lectures`; 
            // หมายเหตุ: /lectures คือ API ที่เราต้องสร้างเพิ่มเพื่อให้ดึงเฉพาะไฟล์อาจารย์
            
            try {
                const res = await fetch(endpoint, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                
                const list = document.getElementById('list');
                const emptyState = document.getElementById('emptyState');
                document.getElementById('fileCount').innerText = `${data.length} ไฟล์`;

                if (data.length === 0) {
                    list.innerHTML = '';
                    emptyState.classList.remove('hidden');
                    return;
                }

                emptyState.classList.add('hidden');
                list.innerHTML = data.map(f => `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-3">
                                <div class="p-2 bg-slate-100 rounded text-slate-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                    </svg>
                                </div>
                                <span class="font-medium text-slate-700">${f.file_name}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-sm text-slate-400">
                            ${new Date(f.uploaded_at).toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: '2-digit' })}
                        </td>
                        <td class="px-6 py-4 text-right">
                            <a href="${f.file_url}" target="_blank" class="inline-flex items-center px-3 py-1 bg-blue-50 text-blue-600 rounded-md text-xs font-bold hover:bg-blue-600 hover:text-white transition-all mr-2">
                                ดูไฟล์
                            </a>
                            ${role === 'teacher' ? `
                                <button onclick="deleteFile(${f.id})" class="text-red-400 hover:text-red-600 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg>
                                </button>
                            ` : ''}
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert('กรุณาเลือกไฟล์!');
            
            const btn = document.getElementById('upBtn');
            const originalText = btn.innerText;
            btn.innerText = 'กำลังอัปโหลด...';
            btn.disabled = true;
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('isLecture', true); // ส่งค่าบอกว่าเป็นไฟล์สอน

            const res = await fetch(`${API}/upload`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });

            if (res.ok) { 
                document.getElementById('fileNamePreview').innerText = '';
                document.getElementById('fileInput').value = '';
                loadFiles(); 
            }
            btn.innerText = originalText;
            btn.disabled = false;
        }

        async function deleteFile(id) {
            if (!confirm('คุณแน่ใจหรือไม่ที่จะลบไฟล์นี้?')) return;
            await fetch(`${API}/files/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            loadFiles();
        }

        function logout() { localStorage.clear(); window.location.href = 'auth.html'; }
        loadFiles();
    </script>
</body>

</html>

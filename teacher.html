<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduVault - Teacher Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">
    <nav class="bg-white shadow-sm border-b px-8 py-4 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-lg text-white font-bold">EV</div>
            <h1 class="text-xl font-bold text-slate-800">EduVault <span class="text-blue-600">Teacher</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right hidden sm:block">
                <p id="userEmailDisplay" class="text-sm font-medium text-slate-700"></p>
                <span class="bg-orange-100 text-orange-600 text-[10px] uppercase font-bold px-2 py-0.5 rounded-full">อาจารย์</span>
            </div>
            <button onclick="logout()" class="text-red-500 text-sm font-bold hover:underline">ออกจากระบบ</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-slate-800">รายวิชาที่ฉันดูแล</h2>
            <button onclick="showCreateCourseModal()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                + สร้างรายวิชาใหม่
            </button>
        </div>
        <div id="myCourses" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
            <p class="text-slate-400">กำลังโหลด...</p>
        </div>

        <h2 class="text-2xl font-bold text-slate-800 mb-6">รายวิชาอื่น ๆ ในระบบ</h2>
        <div id="otherCourses" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12 text-slate-400">
            กำลังโหลด...
        </div>

        <h2 class="text-2xl font-bold text-slate-800 mb-4">คลังไฟล์ของฉัน</h2>
        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <table class="w-full text-left">
                <tbody id="fileList" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </main>

    <div id="courseModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">ข้อมูลรายวิชาใหม่</h2>
            <div class="space-y-4">
                <input type="text" id="courseName" placeholder="ชื่อวิชา" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="courseCode" placeholder="รหัสวิชา" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <textarea id="courseDesc" placeholder="รายละเอียดวิชา..." class="w-full p-4 bg-slate-50 border rounded-xl h-32 outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
            <div class="mt-8 flex gap-4">
                <button onclick="closeCourseModal()" class="flex-1 py-3 text-slate-400 font-bold">ยกเลิก</button>
                <button onclick="submitCreateCourse()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">บันทึก</button>
            </div>
        </div>
    </div>

    <div id="shareModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-4">จัดการสิทธิ์การเข้าถึง</h2>
            <input type="text" id="searchStudent" onkeyup="filterStudents()" placeholder="ค้นหาอีเมลนักศึกษา..." class="w-full p-3 mb-4 bg-slate-50 border rounded-xl outline-none">
            <div id="studentList" class="max-h-60 overflow-y-auto space-y-2 mb-6 text-sm">
                กำลังโหลดรายชื่อ...
            </div>
            <div class="flex gap-4">
                <button onclick="closeShareModal()" class="flex-1 py-3 text-slate-400 font-bold">ปิด</button>
                <button onclick="savePermissions()" class="flex-1 py-3 bg-green-600 text-white rounded-xl font-bold">บันทึกสิทธิ์</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://54.179.11.105:3000';
        const token = localStorage.getItem('accessToken');
        const role = localStorage.getItem('userRole');
        const email = localStorage.getItem('userEmail');

        // Security Check
        if (!token || role !== 'teacher') window.location.href = 'auth.html';
        document.getElementById('userEmailDisplay').innerText = email;

        // --- ฟังก์ชันเกี่ยวกับ Modal ---
        function showCreateCourseModal() { document.getElementById('courseModal').classList.remove('hidden'); }
        function closeCourseModal() { document.getElementById('courseModal').classList.add('hidden'); }
        function closeShareModal() { document.getElementById('shareModal').classList.add('hidden'); }

        // --- โหลดข้อมูลคอร์ส ---
        async function loadCourses() {
            try {
                const res = await fetch(`${API_URL}/courses`, { headers: { 'Authorization': `Bearer ${token}` } });
                const courses = await res.json();
                const myDiv = document.getElementById('myCourses');
                const otherDiv = document.getElementById('otherCourses');
                
                myDiv.innerHTML = ''; otherDiv.innerHTML = '';

                if (courses.length === 0) {
                    myDiv.innerHTML = '<p class="text-slate-400">ไม่มีรายวิชา</p>';
                    return;
                }

                courses.forEach(c => {
                    const isOwner = c.teacher_email === email;
                    const card = `
                        <div class="bg-white rounded-2xl shadow-sm border p-5 hover:shadow-md transition">
                            <div class="h-24 ${isOwner ? 'bg-blue-600' : 'bg-slate-500'} rounded-xl mb-4 flex flex-col justify-end p-4 text-white">
                                <h4 class="font-bold leading-tight">${c.course_name}</h4>
                                <p class="text-[10px] opacity-80">${c.course_code || 'No Code'}</p>
                            </div>
                            <p class="text-[10px] text-slate-400 mb-4 italic">โดย: ${c.teacher_email}</p>
                            ${isOwner ? `
                                <div class="grid grid-cols-3 gap-2">
                                    <button onclick="triggerUpload(${c.id})" class="bg-blue-50 text-blue-600 py-2 rounded-lg text-[10px] font-bold hover:bg-blue-600 hover:text-white transition">ไฟล์</button>
                                    <button onclick="openShareModal(${c.id})" class="bg-green-50 text-green-600 py-2 rounded-lg text-[10px] font-bold hover:bg-green-600 hover:text-white transition">สิทธิ์</button>
                                    <button onclick="deleteCourse(${c.id})" class="bg-red-50 text-red-600 py-2 rounded-lg text-[10px] font-bold hover:bg-red-600 hover:text-white transition">ลบ</button>
                                </div>
                            ` : `<span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-1 rounded">อ่านอย่างเดียว</span>`}
                        </div>
                    `;
                    if (isOwner) myDiv.innerHTML += card;
                    else otherDiv.innerHTML += card;
                });
            } catch (e) { console.error(e); }
        }

        // --- สร้างรายวิชา ---
        async function submitCreateCourse() {
            const name = document.getElementById('courseName').value;
            const code = document.getElementById('courseCode').value;
            const description = document.getElementById('courseDesc').value;
            if (!name) return alert('กรุณาระบุชื่อวิชา');

            const res = await fetch(`${API_URL}/courses`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ name, code, description })
            });

            if (res.ok) {
                alert('สร้างสำเร็จ');
                closeCourseModal();
                loadCourses();
            } else {
                alert('เกิดข้อผิดพลาด');
            }
        }

        // --- จัดการสิทธิ์ ---
        let currentShareCourseId = null;
        let allStudents = [];

        async function openShareModal(courseId) {
            currentShareCourseId = courseId;
            document.getElementById('shareModal').classList.remove('hidden');
            const res = await fetch(`${API_URL}/courses/${courseId}/permissions`, { 
                headers: { 'Authorization': `Bearer ${token}` } 
            });
            allStudents = await res.json();
            renderStudentList(allStudents);
        }

        function renderStudentList(students) {
            document.getElementById('studentList').innerHTML = students.map(s => `
                <div class="flex items-center justify-between p-2 bg-slate-50 rounded-lg">
                    <span>${s.email}</span>
                    <input type="checkbox" value="${s.email}" ${s.has_access ? 'checked' : ''} class="student-checkbox w-4 h-4">
                </div>
            `).join('');
        }

        async function savePermissions() {
            const selected = Array.from(document.querySelectorAll('.student-checkbox:checked')).map(cb => cb.value);
            const res = await fetch(`${API_URL}/courses/permissions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ courseId: currentShareCourseId, studentEmails: selected })
            });
            if (res.ok) { alert('บันทึกสิทธิ์สำเร็จ'); closeShareModal(); }
        }

        // --- ลบรายวิชา ---
        async function deleteCourse(id) {
            if (!confirm('คุณต้องการลบรายวิชานี้และไฟล์ทั้งหมดใช่หรือไม่?')) return;
            const res = await fetch(`${API_URL}/courses/${id}`, { 
                method: 'DELETE', 
                headers: { 'Authorization': `Bearer ${token}` } 
            });
            if (res.ok) loadCourses();
        }

        // --- จัดการไฟล์ ---
        async function loadFiles() {
            const res = await fetch(`${API_URL}/files`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            document.getElementById('fileList').innerHTML = data.map(f => `
                <tr class="hover:bg-slate-50">
                    <td class="px-6 py-4 text-sm font-medium text-slate-700">${f.file_name}</td>
                    <td class="px-6 py-4 text-right text-xs font-bold text-blue-600">
                        <a href="${f.file_url}" target="_blank">DOWNLOAD</a>
                    </td>
                </tr>
            `).join('');
        }

        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        let currentId = null;
        function triggerUpload(id) { currentId = id; fileInput.click(); }
        fileInput.onchange = async () => {
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('courseId', currentId);
            const res = await fetch(`${API_URL}/upload`, { 
                method: 'POST', 
                headers: { 'Authorization': `Bearer ${token}` }, 
                body: formData 
            });
            if (res.ok) { alert('อัปโหลดสำเร็จ'); loadFiles(); }
        };

        function logout() { localStorage.clear(); window.location.href = 'auth.html'; }
        
        window.onload = () => {
            loadCourses();
            loadFiles();
        };
    </script>
</body>
</html>

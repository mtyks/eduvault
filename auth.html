<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduVault - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen px-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-blue-600 mb-2">EduVault</h1>
            <p class="text-slate-500">ยินดีต้อนรับกลับมา! กรุณาเข้าสู่ระบบ</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">อีเมล</label>
                <input type="email" id="email" placeholder="example@university.ac.th" class="w-full p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">รหัสผ่าน</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 active:scale-95 transition-all shadow-lg shadow-blue-100">
                เข้าสู่ระบบ
            </button>
        </div>

        <div class="mt-6 text-center">
            <p class="text-sm text-slate-500">ยังไม่มีบัญชี? <a href="register.html" class="text-blue-600 font-semibold hover:underline">สมัครสมาชิกที่นี่</a></p>
        </div>
        <p id="message" class="mt-6 text-center text-sm font-medium min-h-[20px]"></p>
    </div>
<script>
    const API_URL = 'http://54.179.11.105:3000'; 

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('message');

        try {
            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('accessToken', data.accessToken);
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userRole', data.role);

                msg.innerText = "กำลังเข้าสู่ระบบ...";
                // ✅ แยกหน้าตาม Role
                if (data.role === 'teacher') {
                    window.location.href = 'teacher.html';
                } else {
                    window.location.href = 'student.html';
                }
            } else {
                msg.innerText = data.error || "อีเมลหรือรหัสผ่านไม่ถูกต้อง";
            }
        } catch (err) { msg.innerText = "เชื่อมต่อเซิร์ฟเวอร์ไม่ได้"; }
    }
</script>
